  description: Our privacy policy for Inspectors Toolkit. How we collect, use, and protect your data.
body: |
  ## Introduction

  Last updated: 05/14/2026

  Inspector's Toolkit ("we", "our", "us") is committed to protecting your privacy. This Privacy Policy explains how we collect, use, disclose, and safeguard your information when you use our mobile application and website.

  ### Information We Collect
  - Account information (name, email, company)
  - Device information and app usage metrics
  - Photos, annotations, and inspection reports you upload
  - Payment or billing information (if you make purchases)

  ### How We Use Your Information
  - Provide and maintain the app
  - Generate inspection reports and invoices
  - Improve our products and features
  - Comply with legal obligations

  ### Data Sharing
  We may share data with service providers (hosting, payments), or when required by law. We never sell personal data.

  ### Security
  We implement reasonable security measures, but no system is 100% secure.

  ### Contact
  If you have questions about this policy, contact us at privacy@example.com
