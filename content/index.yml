seo:
  title: Inspectors Toolkit — All your inspection tools in one app
  description: Inspectors Toolkit brings checklists, photo capture, measurements, scheduling, and report generation into a single mobile app built for professional home and building inspectors. Free trial and app store download links.
title: "Inspectors Toolkit\nAll your tools, one app"
description: Built for professional home, building, and specialty inspectors — streamline inspections, capture evidence, and create client-ready reports in minutes.
hero:
  headline: 'Launch faster. Inspect smarter.'
  links:
    - label: Download from the App Store
      color: primary
      size: xl
      to: '#'
      icon: 'ic:baseline-apple'
    - label: Get it on Google Play Store
      size: xl
      color: neutral
      variant: soft
      to: '#'
      icon: 'mage:playstore'
logos:
  title: Trusted by inspection teams at
  items:
    - i-simple-icons-architect
    - i-simple-icons-homeassistant
    - i-simple-icons-google
    - i-simple-icons-aws
features:
  headline: What inspectors need
  title: 'Everything an inspector needs on-site'
  description: From pre-built checklists to offline photo annotation and fast report generation — Inspectors Toolkit is designed around common inspection workflows.
  items:
    - icon: i-lucide-clipboard
      title: Custom Checklists & Templates
      description: Create, import, and reuse inspection templates for every property type — save time and ensure consistency.
    - icon: i-lucide-camera
      title: Photo Capture & Annotation
      description: High-resolution photo capture, automatic timestamp/GPS, and inline annotations for precise evidence.
    - icon: i-lucide-ruler
      title: Measurements & Tools
      description: Built-in measurement tools, unit conversions, and integrations for laser distance devices.
    - icon: i-lucide-file-text
      title: Fast Report Generation
      description: Generate professional, customizable PDF reports with photos, notes, and easy signing.
    - icon: i-lucide-calendar
      title: Scheduling & Client Management
      description: Bookings, client contacts, and calendars — sync with Google Calendar and export jobs.
    - icon: i-lucide-wifi-off
      title: Offline Mode
      description: Work without connectivity — data syncs automatically when back online.
    - icon: i-lucide-shield-check
      title: Standards & Code References
      description: Link to local codes, standards, and inspector notes so you never miss a compliance item.
    - icon: i-lucide-credit-card
      title: Invoicing & Payments
      description: Create invoices from inspection reports and accept payments directly from clients.
    - icon: i-lucide-user-check
      title: Inspector Profiles & Certifications
      description: Manage inspector qualifications, certifications, and access levels — attach credentials to generated reports.
metrics:
  headline: Inspector Insights
  title: 'Key inspection metrics at a glance'
  description: Track productivity and quality across jobs with essential stats that help run a profitable inspection business.
  items:
    - value: '1,248'
      label: Inspections completed
      class: 'text-primary'
    - value: '12m'
      label: Avg. report time
      class: 'text-success'
    - value: '98%'
      label: Client satisfaction
      class: 'text-info'
    - value: 'Offline'
      label: Offline-capable
      class: 'text-warning'
cta:
  title: 'Start inspecting smarter'
  description: Try Inspectors Toolkit free for 14 days. Mobile apps coming to the App Store and Google Play.
  links:
    - label: Download from the App Store
      color: primary
      size: xl
      to: '#'
      icon: 'ic:baseline-apple'
    - label: Get it on Google Play Store
      size: xl
      color: neutral
      variant: soft
      to: '#'
      icon: 'mage:playstore'
